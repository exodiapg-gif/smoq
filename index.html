<!DOCTYPE html>
<html lang="es">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>FC26 Pack Opening</title>

<style>

body{
margin:0;
background:black;
font-family:Arial;
color:white;
text-align:center;
display:flex;
align-items:center;
justify-content:center;
height:100vh;
}

.container{
text-align:center;
}

/* SOBRE */

#pack{
width:240px;
cursor:pointer;
animation:float 3s infinite ease-in-out;
}

@keyframes float{
0%{transform:translateY(0)}
50%{transform:translateY(-12px)}
100%{transform:translateY(0)}
}

/* CARTA */

.card-container{
position:relative;
display:inline-block;
}

#card{
width:320px;
display:none;
border-radius:12px;
}

/* HOLOGRAFICO */

.holo{
position:absolute;
top:0;
left:0;
width:100%;
height:100%;
border-radius:12px;
pointer-events:none;
opacity:0;
mix-blend-mode:screen;
background:linear-gradient(
120deg,
rgba(255,0,150,0.4),
rgba(0,255,255,0.4),
rgba(255,255,0,0.4)
);
background-size:300% 300%;
animation:holoMove 3s infinite linear;
}

@keyframes holoMove{
0%{background-position:0% 50%}
100%{background-position:100% 50%}
}

/* PARTICULAS */

.particle{
position:absolute;
width:6px;
height:6px;
background:gold;
border-radius:50%;
pointer-events:none;
animation:explode 1s forwards;
}

@keyframes explode{
0%{transform:translate(0,0);opacity:1}
100%{transform:translate(var(--x),var(--y));opacity:0}
}

/* BOTONES */

.button{
margin-top:15px;
padding:14px 30px;
background:#00ff88;
color:black;
font-size:16px;
border-radius:10px;
text-decoration:none;
font-weight:bold;
display:inline-block;
cursor:pointer;
}

.secondary{
background:white;
color:black;
}

</style>

</head>

<body>

<div class="container">

<h2 id="title">TOCA EL SOBRE<br>PARA ABRIRLO</h2>

<img id="pack" src="sobre.png">

<div id="card-area">

<h2 id="found"></h2>

<div class="card-container">

<img id="card">
<div class="holo"></div>

</div>

</div>

<br>

<div id="buttons" style="display:none">

<div class="button secondary" onclick="abrirOtro()">
🎴 ABRIR OTRO SOBRE
</div>

<br>

<div class="button" onclick="descargarApp()">
DESCARGAR EL JUEGO
</div>

</div>

</div>

<script>

var comunes=[
"bellingham.jpg",
"vinicius.jpg",
"llorente.jpg",
"militao.jpg",
"rodrygo.jpg"
];

var epicas=[
"epic2.png"
];

var legendarias=[
"legendary1.png"
];

var pack=document.getElementById("pack");
var card=document.getElementById("card");
var holo=document.querySelector(".holo");

pack.onclick=function(){

pack.style.display="none";

var random=Math.random();

/* LEGENDARIA */

if(random<0.20){

card.src=legendarias[0];
document.getElementById("found").innerText="¡CARTA LEGENDARIA!";

card.style.filter="drop-shadow(0 0 40px gold)";
holo.style.opacity="1";

crearParticulas();

}

/* EPICA */

else if(random<0.50){

card.src=epicas[0];
document.getElementById("found").innerText="¡CARTA ÉPICA!";

card.style.filter="drop-shadow(0 0 30px purple)";
holo.style.opacity="0.6";

}

/* COMUN */

else{

card.src=comunes[Math.floor(Math.random()*comunes.length)];
document.getElementById("found").innerText="Carta común";

card.style.filter="none";
holo.style.opacity="0";

}

card.style.display="block";

document.getElementById("buttons").style.display="block";

};

/* PARTICULAS */

function crearParticulas(){

for(let i=0;i<25;i++){

let p=document.createElement("div");

p.className="particle";

let x=(Math.random()*400-200)+"px";
let y=(Math.random()*400-200)+"px";

p.style.setProperty("--x",x);
p.style.setProperty("--y",y);

p.style.left="50%";
p.style.top="50%";

document.body.appendChild(p);

setTimeout(()=>p.remove(),1000);

}

}

/* ABRIR OTRO */

function abrirOtro(){

location.reload();

}

/* DESCARGAR APP */

function descargarApp(){

var ua=navigator.userAgent.toLowerCase();

if(ua.indexOf("android")>-1){

window.location.href="https://play.google.com/store/apps/details?id=com.smoqgames.smoqgames26";

}
else if(ua.indexOf("iphone")>-1 || ua.indexOf("ipad")>-1){

alert("⚽ Este juego está disponible solo en Android. Puedes verlo en Google Play.");

window.location.href="https://play.google.com/store/apps/details?id=com.smoqgames.smoqgames26";

}
else{

window.location.href="https://play.google.com/store/apps/details?id=com.smoqgames.smoqgames26";

}

}

</script>

</body>
</html>
