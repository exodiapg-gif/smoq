<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Abrir Sobre</title>

<style>

body{
margin:0;
background:radial-gradient(circle at center,#111,#000);
font-family:Arial;
color:white;
display:flex;
align-items:center;
justify-content:center;
height:100vh;
overflow:hidden;
text-align:center;
}

/* CONTENEDOR */

#stage{
position:relative;
}

/* SOBRE */

#pack{
width:260px;
cursor:pointer;
animation:flotar 3s ease-in-out infinite;
transition:0.5s;
}

#pack:hover{
transform:scale(1.1);
}

/* CARTA */

#card{
display:none;
width:320px;
animation:reveal 0.8s ease;
}

/* TEXTO */

#text{
margin-bottom:20px;
font-size:22px;
}

/* BOTON */

#button{
display:none;
margin-top:20px;
padding:15px 35px;
background:#00ff88;
color:black;
font-weight:bold;
font-size:18px;
border-radius:10px;
text-decoration:none;
}

/* EFECTO LUZ */

#flash{
position:fixed;
width:100%;
height:100%;
background:white;
opacity:0;
pointer-events:none;
}

/* ANIMACIONES */

@keyframes flotar{
0%{transform:translateY(0)}
50%{transform:translateY(-15px)}
100%{transform:translateY(0)}
}

@keyframes reveal{
0%{transform:scale(0.4) rotate(-10deg); opacity:0}
100%{transform:scale(1); opacity:1}
}

</style>

</head>

<body>

<div id="flash"></div>

<div id="stage">

<h2 id="text">Toca el sobre para abrirlo</h2>

<img id="pack" src="sobre.png">

<img id="card">

<br>

<a id="button" onclick="abrirApp()">Abrir o Descargar el Juego</a>

</div>

<script>

var cartas = [
"bellingham.jpg",
"vinicius.jpg",
"llorente.jpg",
"militao.jpg",
"rodrygo.jpg"
];

var pack = document.getElementById("pack");
var flash = document.getElementById("flash");
var card = document.getElementById("card");
var text = document.getElementById("text");
var button = document.getElementById("button");

pack.onclick = function(){

text.innerText="Abriendo sobre...";

flash.style.opacity="1";

setTimeout(function(){
flash.style.opacity="0";
},200);

setTimeout(function(){

pack.style.display="none";

var random = cartas[Math.floor(Math.random()*cartas.length)];

card.src=random;

card.style.display="block";

text.innerText="¡Carta encontrada!";

button.style.display="inline-block";

},900);

};

function abrirApp(){

var ua=navigator.userAgent.toLowerCase();

if(ua.indexOf("android")>-1){
window.location.href="market://details?id=com.smoqgames.smoqgames26";
}else{
window.location.href="https://play.google.com/store/apps/details?id=com.smoqgames.smoqgames26";
}

}

</script>

</body>
</html>
