<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Abrir Sobre</title>

<style>

body{
margin:0;
background:black;
color:white;
font-family:Arial;
display:flex;
align-items:center;
justify-content:center;
height:100vh;
text-align:center;
overflow:hidden;
}

#pack{
width:220px;
cursor:pointer;
transition:0.6s;
}

#pack:hover{
transform:scale(1.05);
}

#card{
display:none;
width:300px;
}

#button{
display:none;
margin-top:20px;
padding:15px 30px;
background:#00ff88;
color:black;
font-size:18px;
border-radius:10px;
text-decoration:none;
}

</style>

</head>

<body>

<div id="stage">

<h2 id="text">Toca el sobre para abrirlo</h2>

<img id="pack" src="sobre.png">

<img id="card">

<br>

<a id="button" onclick="abrirApp()">Abrir o Descargar el Juego</a>

</div>

<script>

var cartas = [
"bellingham.jpg",
"vinicius.jpg",
"llorente.jpg",
"militao.jpg",
"rodrygo.jpg"
];

document.getElementById("pack").onclick = function(){

document.getElementById("text").innerText="Abriendo sobre...";

setTimeout(function(){

document.getElementById("pack").style.display="none";

var random = cartas[Math.floor(Math.random()*cartas.length)];

var card = document.getElementById("card");

card.src=random;

card.style.display="block";

document.getElementById("text").innerText="¡Carta encontrada!";

document.getElementById("button").style.display="inline-block";

},1200);

};

function abrirApp(){

var ua=navigator.userAgent.toLowerCase();

if(ua.indexOf("android")>-1){
window.location.href="market://details?id=com.smoqgames.smoqgames26";
}else{
window.location.href="https://play.google.com/store/apps/details?id=com.smoqgames.smoqgames26";
}

}

</script>

</body>
</html>
