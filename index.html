<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>El juego continúa</title>

<style>

body{
margin:0;
background:radial-gradient(circle,#111,#000);
color:white;
font-family:Arial;
display:flex;
align-items:center;
justify-content:center;
height:100vh;
text-align:center;
overflow:hidden;
}

/* ESCENAS */

.scene{
position:absolute;
width:100%;
height:100%;
display:flex;
flex-direction:column;
align-items:center;
justify-content:center;
transition:opacity 1s;
}

.hidden{
opacity:0;
pointer-events:none;
}

/* SOBRE */

#pack{
width:260px;
cursor:pointer;
animation:flotar 3s infinite ease-in-out;
}

/* CARTA */

#card{
display:none;
width:320px;
animation:reveal 0.8s ease;
}

/* BOTON */

.button{
margin-top:30px;
padding:18px 40px;
background:#00ff88;
color:black;
font-weight:bold;
font-size:20px;
border-radius:12px;
text-decoration:none;
}

/* ANIMACIONES */

@keyframes flotar{
0%{transform:translateY(0)}
50%{transform:translateY(-15px)}
100%{transform:translateY(0)}
}

@keyframes reveal{
0%{transform:scale(0.3); opacity:0}
100%{transform:scale(1); opacity:1}
}

</style>
</head>

<body>

<!-- ESCENA 1 -->

<div id="scene1" class="scene">

<h2>Toca el sobre para abrirlo</h2>

<img id="pack" src="sobre.png">

</div>

<!-- ESCENA 2 -->

<div id="scene2" class="scene hidden">

<h2 id="found">¡Carta encontrada!</h2>

<img id="card">

</div>

<!-- ESCENA 3 FINAL -->

<div id="scene3" class="scene hidden">

<h1>⚽ El juego continúa más allá del campo</h1>

<p>
Colecciona la emoción y vive el fútbol como nunca antes.
</p>

<p>
Descubre cartas, arma tu equipo y sigue jugando en el mundo digital.
</p>

<a class="button" onclick="abrirApp()">Abrir o Descargar el Juego</a>

</div>

<script>

var cartas = [
"bellingham.jpg",
"vinicius.jpg",
"llorente.jpg",
"militao.jpg",
"rodrygo.jpg"
];

var pack = document.getElementById("pack");

pack.onclick = function(){

document.getElementById("scene1").classList.add("hidden");

setTimeout(function(){

document.getElementById("scene2").classList.remove("hidden");

var random = cartas[Math.floor(Math.random()*cartas.length)];

var card = document.getElementById("card");

card.src=random;

card.style.display="block";

},600);

setTimeout(function(){

document.getElementById("scene2").classList.add("hidden");

document.getElementById("scene3").classList.remove("hidden");

},3500);

};

function abrirApp(){

var ua=navigator.userAgent.toLowerCase();

if(ua.indexOf("android")>-1){
window.location.href="market://details?id=com.smoqgames.smoqgames26";
}else{
window.location.href="https://play.google.com/store/apps/details?id=com.smoqgames.smoqgames26";
}

}

</script>

</body>
</html>
