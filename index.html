<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Pack Opening</title>

<style>

body{
margin:0;
background:black;
font-family:Arial;
color:white;
overflow:hidden;
}

/* ESCENAS */

.scene{
position:absolute;
width:100%;
height:100%;
display:flex;
flex-direction:column;
align-items:center;
justify-content:center;
transition:opacity 1s;
}

.hidden{
opacity:0;
pointer-events:none;
}

/* ESTADIO */

#scene1{
background:
radial-gradient(circle at center,#111,#000);
}

/* TEXTO */

.title{
font-size:30px;
margin-bottom:40px;
letter-spacing:1px;
}

/* SOBRE */

#pack{
width:260px;
cursor:pointer;
animation:float 3s infinite ease-in-out;
filter:drop-shadow(0 0 25px #00aaff);
}

/* CARTA */

#card{
display:none;
width:340px;
animation:cardReveal 1s ease;
filter:drop-shadow(0 0 30px gold);
}

/* BOTON */

.button{
margin-top:30px;
padding:18px 40px;
background:#00ff88;
color:black;
font-size:20px;
font-weight:bold;
border-radius:12px;
text-decoration:none;
}

/* PARTICULAS */

.particle{
position:absolute;
width:6px;
height:6px;
background:white;
border-radius:50%;
opacity:0.6;
animation:particle 4s linear infinite;
}

/* ANIMACIONES */

@keyframes float{
0%{transform:translateY(0)}
50%{transform:translateY(-15px)}
100%{transform:translateY(0)}
}

@keyframes cardReveal{
0%{transform:scale(0.2) rotate(-10deg);opacity:0}
100%{transform:scale(1);opacity:1}
}

@keyframes particle{
0%{transform:translateY(0)}
100%{transform:translateY(-100vh)}
}

</style>
</head>

<body>

<!-- ESCENA SOBRE -->

<div id="scene1" class="scene">

<div class="title">Una nueva carta te espera…</div>

<img id="pack" src="sobre.png">

</div>

<!-- ESCENA CARTA -->

<div id="scene2" class="scene hidden">

<div class="title">¡Carta encontrada!</div>

<img id="card">

</div>

<!-- ESCENA FINAL -->

<div id="scene3" class="scene hidden">

<h1>⚽ El juego continúa más allá del campo</h1>

<p style="font-size:20px">
Colecciona la emoción.<br>
Construye tu equipo.<br>
Sigue jugando en el mundo digital.
</p>

<a class="button" onclick="abrirApp()">Abrir o Descargar el Juego</a>

</div>

<script>

var cartas = [
"bellingham.jpg",
"vinicius.jpg",
"llorente.jpg",
"militao.jpg",
"rodrygo.jpg"
];

var pack = document.getElementById("pack");

pack.onclick = function(){

document.getElementById("scene1").classList.add("hidden");

setTimeout(function(){

document.getElementById("scene2").classList.remove("hidden");

var random = cartas[Math.floor(Math.random()*cartas.length)];

var card = document.getElementById("card");

card.src=random;

card.style.display="block";

},700);

setTimeout(function(){

document.getElementById("scene2").classList.add("hidden");

document.getElementById("scene3").classList.remove("hidden");

},4200);

};

function abrirApp(){

var ua=navigator.userAgent.toLowerCase();

if(ua.indexOf("android")>-1){
window.location.href="market://details?id=com.smoqgames.smoqgames26";
}else{
window.location.href="https://play.google.com/store/apps/details?id=com.smoqgames.smoqgames26";
}

}

</script>

</body>
</html>
